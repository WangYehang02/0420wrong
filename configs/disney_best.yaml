# Disney · 稳健主配置 disney_best_fmgad_refined（多 seed 推荐）
dataset: disney
exp_tag: disney_best_refined_multiseed
ae_alpha: 0.55
ae_dropout: 0.35
ae_lr: 0.025
flow_t_sampling: logit_normal
hid_dim: null
proto_alpha: 0.005
residual_scale: 10.0
sample_steps: 75
use_adaptive_residual_scale: false
use_multi_scale_residual: false
use_multi_score_fusion: false
use_score_smoothing: true
use_virtual_neighbors: false
weight: 1.75
num_trial: 1
quantile_rank_polarity: false
quantile_rank_low: 0.1
quantile_rank_high: 0.9
quantile_rank_threshold: 0.5
kmeans_polarity: false
polarity_hybrid: true
kmeans_max_minority_ratio: 0.42
flip_score: false
# 无监督极性：Smooth 探针（与 weibo 等同系）
lcc_spearman_polarity: false
lcc_polarity_mode: tail
lcc_tail_k_percent: 0.05
lcc_tail_margin: 1.2
lcc_spearman_threshold: -0.05
smoothgnn_polarity: true
smoothgnn_anchor_k_percent: 0.05
smoothgnn_anchor_margin: 1.05
smoothgnn_robust_spearman_threshold: -0.1
smoothgnn_eps: 0.004
smooth_discrepancy_polarity: false
smooth_discrepancy_mode: spearman
smooth_discrepancy_spearman_threshold: -0.05
smooth_discrepancy_representation: embedding
smooth_discrepancy_k_percent: 0.05
smooth_discrepancy_tail_margin: 1.0
iforest_anchor_polarity: false
iforest_n_estimators: 100
